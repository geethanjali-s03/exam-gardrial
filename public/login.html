<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exam Portal Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#1e3c72);
background-size:400% 400%;
animation:gradient 12s ease infinite;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:100%;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.box{

background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.2);

padding:40px;
border-radius:20px;

width:350px;
color:white;
text-align:center;

box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.box h2{
margin-bottom:25px;
font-weight:600;
}

.input-group{
position:relative;
margin:20px 0;
}

.input-group input{
width:100%;
padding:12px 40px 12px 12px;
border:none;
outline:none;
border-radius:10px;
background:rgba(255,255,255,0.2);
color:white;
font-size:14px;
}

.input-group label{
position:absolute;
left:12px;
top:12px;
font-size:13px;
color:#ddd;
pointer-events:none;
transition:0.3s;
}

.input-group input:focus + label,
.input-group input:not(:placeholder-shown) + label{
top:-8px;
left:10px;
font-size:11px;
background:#2c5364;
padding:0 5px;
border-radius:5px;
}

.toggle-password{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
font-size:14px;
opacity:0.8;
}

button{

width:100%;
padding:12px;
margin-top:15px;

border:none;
border-radius:30px;

background:linear-gradient(45deg,#42a5f5,#1e88e5);
color:white;

font-size:15px;
font-weight:500;

cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 6px 20px rgba(0,0,0,0.3);
}

button:disabled{
opacity:0.6;
cursor:not-allowed;
}

.error{
margin-top:10px;
font-size:13px;
color:#ff8080;
}

.loading{
margin-top:10px;
font-size:13px;
opacity:0.8;
}

@media(max-width:400px){

.box{
width:90%;
padding:30px;
}

}

</style>
</head>

<body>

<div class="container">

<div class="box">

<h2>Online Exam Login</h2>

<div class="input-group">
<input id="usn" placeholder=" " required>
<label>USN</label>
</div>

<div class="input-group">
<input id="password" type="password" placeholder=" " required>
<label>Password</label>
<span class="toggle-password" onclick="togglePassword()">👁</span>
</div>

<button id="loginBtn" onclick="login()">Login</button>

<p class="loading" id="loading"></p>
<p class="error" id="error"></p>

</div>
</div>

<script>

function togglePassword(){

let pass=document.getElementById("password")

if(pass.type==="password"){
pass.type="text"
}else{
pass.type="password"
}

}

async function login(){

let usn=document.getElementById("usn").value
let password=document.getElementById("password").value

let error=document.getElementById("error")
let loading=document.getElementById("loading")
let btn=document.getElementById("loginBtn")

error.innerText=""

if(usn==="" || password===""){
error.innerText="Please enter USN and Password"
return
}

btn.disabled=true
loading.innerText="Logging in..."

try{

let res=await fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({usn,password})
})

let data=await res.json()

if(data.status==="success"){

sessionStorage.setItem("usn",usn)

window.location="exam.html"

}else{

error.innerText="Invalid USN or Password"

}

}catch(e){

error.innerText="Server error. Try again."

}

loading.innerText=""
btn.disabled=false

}

</script>

</body>
</html>
